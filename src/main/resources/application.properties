spring.application.name=Finance_Backend

# PostgreSQL - database: finance_db
spring.datasource.url=jdbc:postgresql://localhost:5432/finance_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8080
server.error.include-message=always

# Response Compression (GZIP)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# HikariCP Connection Pool (Optimized for Neon/Render)
# Reduce max pool size to speed up startup on cold starts
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
# How long a connection can sit idle before being closed
spring.datasource.hikari.idle-timeout=60000
# Max time to wait for a connection from the pool
spring.datasource.hikari.connection-timeout=30000
# Max lifetime of a connection in the pool
spring.datasource.hikari.max-lifetime=1800000
# Test connection periodically
spring.datasource.hikari.keepalive-time=30000

# AI (Gemini)
ai.gemini.model=gemini-flash-latest

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

